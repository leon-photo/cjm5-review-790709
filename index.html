<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CJM 5.0 效果对比</title>
    <style>
      :root {
        --bg: #f5f7f8;
        --text: #171f26;
        --muted: #667781;
        --panel: #ffffff;
        --line: #dce4e8;
        --warn: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(14px);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.2;
      }

      header p {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .summary {
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        white-space: nowrap;
      }

      main {
        display: grid;
        gap: 18px;
        padding: 18px 24px 40px;
      }

      .case-row {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .case-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .case-title h2 {
        font-size: 17px;
      }

      .case-title span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
      }

      .image-card {
        min-width: 0;
        border-right: 1px solid var(--line);
      }

      .image-card:last-child {
        border-right: 0;
      }

      .image-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        min-height: 54px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .image-head h3 {
        font-size: 15px;
      }

      .image-head p {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
        text-align: right;
      }

      .image-box,
      .missing {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 360px;
        padding: 0;
        border: 0;
        background:
          linear-gradient(45deg, rgba(24, 32, 38, 0.04) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(24, 32, 38, 0.04) 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, rgba(24, 32, 38, 0.04) 75%),
          linear-gradient(-45deg, transparent 75%, rgba(24, 32, 38, 0.04) 75%);
        background-color: #fafcfd;
        background-position:
          0 0,
          0 10px,
          10px -10px,
          -10px 0;
        background-size: 20px 20px;
        cursor: zoom-in;
      }

      .image-box img {
        display: block;
        width: 100%;
        height: 100%;
        max-height: 68vh;
        object-fit: contain;
      }

      .missing {
        align-content: center;
        gap: 8px;
        color: var(--warn);
        font-weight: 800;
        cursor: default;
      }

      .missing small {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        place-items: center;
        padding: 54px 20px 20px;
        background: rgba(8, 12, 16, 0.88);
      }

      .lightbox.is-open {
        display: grid;
      }

      .lightbox button {
        position: fixed;
        top: 14px;
        right: 14px;
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        cursor: pointer;
      }

      .lightbox img {
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        background: #fff;
        object-fit: contain;
      }

      @media (max-width: 900px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .summary {
          white-space: normal;
        }

        .image-grid {
          grid-template-columns: 1fr;
        }

        .image-card {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .image-card:last-child {
          border-bottom: 0;
        }

        .image-box,
        .missing {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>CJM 5.0 效果对比</h1>
        <p>原图 / CJM / 真美 Gemini</p>
      </div>
      <div class="summary">21 组图片，CJM 缺 1 张</div>
    </header>

    <main id="gallery"></main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
      <button id="closeLightbox" type="button">关闭</button>
      <img id="lightboxImage" alt="图片预览" />
    </div>

    <script>
      const cases = [
        { id: "1", original: "1_.jpeg", cjm: "1__digicam.jpg", gemini: "1__edited_1.png" },
        { id: "3", original: "3_.jpg", cjm: "3__digicam.jpg", gemini: "3__edited_1.png" },
        { id: "5", original: "5_.jpeg", cjm: "5__digicam.jpg", gemini: "5__edited_1.png" },
        { id: "7", original: "7_.jpeg", cjm: "7__digicam.jpg", gemini: "7__edited_1.png" },
        { id: "11", original: "11_.jpeg", cjm: "11__digicam.jpg", gemini: "11__edited_1.png" },
        { id: "13", original: "13_.jpeg", cjm: "13__digicam.jpg", gemini: "13__edited_1.png" },
        { id: "15", original: "15_.jpeg", cjm: null, gemini: "15__edited_1.png" },
        { id: "17", original: "17_.jpeg", cjm: "17__digicam.jpg", gemini: "17__edited_1.png" },
        { id: "19", original: "19_.jpeg", cjm: "19__digicam.jpg", gemini: "19__edited_1.png" },
        { id: "21", original: "21_.jpeg", cjm: "21__digicam.jpg", gemini: "21__edited_1.png" },
        { id: "23", original: "23_.jpeg", cjm: "23__digicam.jpg", gemini: "23__edited_1.png" },
        { id: "25", original: "25_.jpeg", cjm: "25__digicam.jpg", gemini: "25__edited_1.png" },
        { id: "27", original: "27_.jpeg", cjm: "27__digicam.jpg", gemini: "27__edited_1.png" },
        { id: "29", original: "29_.jpeg", cjm: "29__digicam.jpg", gemini: "29__edited_1.png" },
        { id: "31", original: "31_.jpeg", cjm: "31__digicam.jpg", gemini: "31__edited_1.png" },
        { id: "33", original: "33_.jpeg", cjm: "33__digicam.jpg", gemini: "33__edited_1.png" },
        { id: "35", original: "35_.jpeg", cjm: "35__digicam.jpg", gemini: "35__edited_1.png" },
        { id: "37", original: "37_.jpeg", cjm: "37__digicam.jpg", gemini: "37__edited_1.png" },
        { id: "39", original: "39_.jpg", cjm: "39__digicam.jpg", gemini: "39__edited_1.png" },
        { id: "41", original: "41_.jpeg", cjm: "41__digicam.jpg", gemini: "41__edited_1.png" },
        { id: "43", original: "43_.jpg", cjm: "43__digicam.jpg", gemini: "43__edited_1.png" },
      ];

      const gallery = document.getElementById("gallery");
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");

      function asset(group, fileName) {
        return `assets/${group}/${fileName}`;
      }

      function render() {
        gallery.innerHTML = cases
          .map((item, index) => `
            <section class="case-row">
              <div class="case-title">
                <h2>${index + 1}. 编号 ${item.id}</h2>
                <span>${item.cjm ? "" : "CJM 缺图"}</span>
              </div>
              <div class="image-grid">
                ${panel("原图", item.original, asset("original", item.original))}
                ${panel("CJM", item.cjm, item.cjm ? asset("cjm", item.cjm) : null)}
                ${panel("真美 / Gemini", item.gemini, asset("gemini", item.gemini))}
              </div>
            </section>
          `)
          .join("");

        document.querySelectorAll("[data-full-src]").forEach((button) => {
          button.addEventListener("click", () => openLightbox(button.dataset.fullSrc));
        });
      }

      function panel(title, fileName, src) {
        const body = src
          ? `<button class="image-box" type="button" data-full-src="${src}">
              <img src="${src}" alt="${title} ${fileName}" loading="lazy" />
            </button>`
          : `<div class="missing">缺图<small>未找到对应 CJM 输出</small></div>`;

        return `
          <article class="image-card">
            <div class="image-head">
              <h3>${title}</h3>
              <p>${fileName || "缺图"}</p>
            </div>
            ${body}
          </article>
        `;
      }

      function openLightbox(src) {
        lightboxImage.src = src;
        lightbox.classList.add("is-open");
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightboxImage.removeAttribute("src");
      }

      document.getElementById("closeLightbox").addEventListener("click", closeLightbox);
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) closeLightbox();
      });

      render();
    </script>
  </body>
</html>
